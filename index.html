<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#faf4e6" />
    <title>NoobCode</title>
    <script>
      // Apply the saved color theme before first paint to avoid a flash. An
      // unknown/absent id falls back to the cream defaults on :root.
      try {
        var t = localStorage.getItem('noobcode-theme')
        if (t) document.documentElement.dataset.theme = t
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

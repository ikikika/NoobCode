<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#faf4e6" />
    <title>NoobCode</title>
    <script>
      // Apply the saved color theme before first paint to avoid a flash. An
      // unknown/absent id falls back to the cream defaults on :root. For a
      // 'custom' theme, apply the saved per-token palette as inline vars too.
      try {
        var t = localStorage.getItem('noobcode-theme')
        if (t) document.documentElement.dataset.theme = t
        if (t === 'custom') {
          var c = JSON.parse(localStorage.getItem('noobcode-custom-theme') || '{}')
          var root = document.documentElement
          for (var k in c) root.style.setProperty('--color-' + k, c[k])
          if (c.accent) {
            var h = c.accent.replace('#', '')
            var r = parseInt(h.slice(0, 2), 16)
            var g = parseInt(h.slice(2, 4), 16)
            var b = parseInt(h.slice(4, 6), 16)
            root.style.setProperty('--color-accent-soft', 'rgba(' + r + ',' + g + ',' + b + ',0.12)')
          }
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
